version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - cd ../..
            # Remove any cached node_modules: a previously cached tree can be
            # missing platform-native optional deps (e.g. lightningcss-linux-x64-gnu),
            # and `npm install` won't refetch them if the parent pkg is present.
            - rm -rf node_modules
            - npm install --legacy-peer-deps
            - cd apps/web
        build:
          commands:
            # Amplify console env vars are available at build time but NOT to the
            # Next.js SSR runtime. Write server-only secrets into .env.production
            # so the Next server loads them at runtime. Secret stays in the console.
            - if [ -n "$SERPAPI_KEY" ]; then echo "SERPAPI_KEY=$SERPAPI_KEY" >> .env.production; fi
            # Amazon SES (SMTP) server-only vars — same pattern: console -> runtime.
            - if [ -n "$SES_SMTP_HOST" ]; then echo "SES_SMTP_HOST=$SES_SMTP_HOST" >> .env.production; fi
            - if [ -n "$SES_SMTP_PORT" ]; then echo "SES_SMTP_PORT=$SES_SMTP_PORT" >> .env.production; fi
            - if [ -n "$SES_SMTP_USER" ]; then echo "SES_SMTP_USER=$SES_SMTP_USER" >> .env.production; fi
            - if [ -n "$SES_SMTP_PASS" ]; then printf 'SES_SMTP_PASS=%s\n' "$SES_SMTP_PASS" >> .env.production; fi
            - if [ -n "$SES_FROM_EMAIL" ]; then echo "SES_FROM_EMAIL=$SES_FROM_EMAIL" >> .env.production; fi
            - if [ -n "$SES_FROM_NAME" ]; then echo "SES_FROM_NAME=$SES_FROM_NAME" >> .env.production; fi
            - if [ -n "$SALES_NOTIFY_EMAIL" ]; then echo "SALES_NOTIFY_EMAIL=$SALES_NOTIFY_EMAIL" >> .env.production; fi
            - npm run build
        postBuild:
          commands:
            - echo "Build complete"
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        # node_modules intentionally NOT cached: caching it re-introduced a
        # broken tree missing Linux-native optional deps. .next/cache still
        # gives most of the build-speed benefit.
        paths:
          - .next/cache/**/*
      env:
        variables:
          NEXT_PUBLIC_API_URL: https://api.zerpa.co.za/api/v1
          AMPLIFY_MONOREPO_APP_ROOT: apps/web
    appRoot: apps/web
