version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - cd ../..
            - npm install --legacy-peer-deps
            - cd apps/web
        build:
          commands:
            - npm run build
        postBuild:
          commands:
            - echo "Build complete"
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
    appRoot: apps/web
