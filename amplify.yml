version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - cd apps/web
            - npm install --legacy-peer-deps
        build:
          commands:
            - npm run build
        postBuild:
          commands:
            - echo "Build complete"
      artifacts:
        baseDirectory: apps/web/.next
        files:
          - '**/*'
      cache:
        paths:
          - apps/web/node_modules/**/*
          - apps/web/.next/cache/**/*
    appRoot: apps/web
