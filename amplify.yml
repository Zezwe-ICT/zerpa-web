version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - cd ../..
            - npm install --legacy-peer-deps
            - cd apps/web
        build:
          commands:
            - npm run build
        postBuild:
          commands:
            - echo "Build complete"
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
      env:
        variables:
          NEXT_PUBLIC_API_URL: https://api.zerpa.co.za/api/v1
          AMPLIFY_MONOREPO_APP_ROOT: apps/web
    appRoot: apps/web
