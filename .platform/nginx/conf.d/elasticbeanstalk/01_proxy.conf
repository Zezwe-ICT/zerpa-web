# Elastic Beanstalk Nginx configuration for API routing
# This file routes /api requests to the Node.js backend on port 8080

upstream backend {
    server 127.0.0.1:8080;
    keepalive 256;
}

server {
    listen 80;
    server_name _;

    # API routing - proxy to Node.js backend
    location /api {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffer settings for large requests
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Health endpoint routing
    location /health {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Default location - frontend
    location / {
        # If this is a Next.js frontend, add appropriate configuration
        # Otherwise, return 404 for unmatched routes
        return 404;
    }
}
